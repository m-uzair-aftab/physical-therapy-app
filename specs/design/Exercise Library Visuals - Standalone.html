document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n    <div style=\"font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#D98F45;margin-bottom:8px;\">Exercise visuals · full library<\u002Fdiv>\n    <div style=\"font-size:30px;font-weight:800;letter-spacing:-0.02em;\">All 15 exercises — two-pose sequences<\u002Fdiv>\n    <div style=\"color:#67737F;font-size:15px;margin-top:8px;line-height:1.5;max-width:600px;\">One figure engine, one set of joint positions per pose. Dumbbells, balls, cables and bands are the only props. Review these, then I'll drop them into the workout panels.<\u002Fdiv>\n\n    <div style=\"font-size:20px;font-weight:700;letter-spacing:-0.01em;margin:36px 0 16px;\">Functional<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;\">\n      <sc-for list=\"{{ functional }}\" as=\"ex\" hint-placeholder-count=\"8\">\n        <div style=\"background:#fff;border:1px solid #E3E8DF;border-radius:14px;padding:14px;\">\n          <svg viewBox=\"0 0 300 200\" style=\"width:100%;height:auto;display:block;\" fill=\"none\">\n            <sc-for list=\"{{ ex.a.ellipses }}\" as=\"e\" hint-placeholder-count=\"1\"><ellipse cx=\"{{ e.cx }}\" cy=\"{{ e.cy }}\" rx=\"{{ e.rx }}\" ry=\"{{ e.ry }}\" fill=\"{{ e.fill }}\" stroke=\"{{ e.stroke }}\" stroke-width=\"{{ e.sw }}\"><\u002Fellipse><\u002Fsc-for>\n            <sc-for list=\"{{ ex.a.backCircles }}\" as=\"c\" hint-placeholder-count=\"1\"><circle cx=\"{{ c.cx }}\" cy=\"{{ c.cy }}\" r=\"{{ c.r }}\" fill=\"{{ c.fill }}\" stroke=\"{{ c.stroke }}\" stroke-width=\"{{ c.sw }}\"><\u002Fcircle><\u002Fsc-for>\n            <sc-for list=\"{{ ex.a.segs }}\" as=\"s\" hint-placeholder-count=\"7\"><line x1=\"{{ s.x1 }}\" y1=\"{{ s.y1 }}\" x2=\"{{ s.x2 }}\" y2=\"{{ s.y2 }}\" stroke=\"{{ s.color }}\" stroke-width=\"{{ s.w }}\" stroke-linecap=\"round\"><\u002Fline><\u002Fsc-for>\n            <sc-for list=\"{{ ex.a.rects }}\" as=\"r\" hint-placeholder-count=\"2\"><rect x=\"{{ r.x }}\" y=\"{{ r.y }}\" width=\"{{ r.w }}\" height=\"{{ r.h }}\" rx=\"{{ r.rx }}\" fill=\"{{ r.fill }}\"><\u002Frect><\u002Fsc-for>\n            <sc-for list=\"{{ ex.a.circles }}\" as=\"c\" hint-placeholder-count=\"1\"><circle cx=\"{{ c.cx }}\" cy=\"{{ c.cy }}\" r=\"{{ c.r }}\" fill=\"{{ c.fill }}\" stroke=\"{{ c.stroke }}\" stroke-width=\"{{ c.sw }}\"><\u002Fcircle><\u002Fsc-for>\n            <path d=\"M138 100 h16 M150 94 l6 6 l-6 6\" stroke=\"#D98F45\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpath>\n            <g transform=\"translate(158,0)\">\n              <sc-for list=\"{{ ex.b.ellipses }}\" as=\"e\" hint-placeholder-count=\"1\"><ellipse cx=\"{{ e.cx }}\" cy=\"{{ e.cy }}\" rx=\"{{ e.rx }}\" ry=\"{{ e.ry }}\" fill=\"{{ e.fill }}\" stroke=\"{{ e.stroke }}\" stroke-width=\"{{ e.sw }}\"><\u002Fellipse><\u002Fsc-for>\n              <sc-for list=\"{{ ex.b.backCircles }}\" as=\"c\" hint-placeholder-count=\"1\"><circle cx=\"{{ c.cx }}\" cy=\"{{ c.cy }}\" r=\"{{ c.r }}\" fill=\"{{ c.fill }}\" stroke=\"{{ c.stroke }}\" stroke-width=\"{{ c.sw }}\"><\u002Fcircle><\u002Fsc-for>\n              <sc-for list=\"{{ ex.b.segs }}\" as=\"s\" hint-placeholder-count=\"7\"><line x1=\"{{ s.x1 }}\" y1=\"{{ s.y1 }}\" x2=\"{{ s.x2 }}\" y2=\"{{ s.y2 }}\" stroke=\"{{ s.color }}\" stroke-width=\"{{ s.w }}\" stroke-linecap=\"round\"><\u002Fline><\u002Fsc-for>\n              <sc-for list=\"{{ ex.b.rects }}\" as=\"r\" hint-placeholder-count=\"2\"><rect x=\"{{ r.x }}\" y=\"{{ r.y }}\" width=\"{{ r.w }}\" height=\"{{ r.h }}\" rx=\"{{ r.rx }}\" fill=\"{{ r.fill }}\"><\u002Frect><\u002Fsc-for>\n              <sc-for list=\"{{ ex.b.circles }}\" as=\"c\" hint-placeholder-count=\"1\"><circle cx=\"{{ c.cx }}\" cy=\"{{ c.cy }}\" r=\"{{ c.r }}\" fill=\"{{ c.fill }}\" stroke=\"{{ c.stroke }}\" stroke-width=\"{{ c.sw }}\"><\u002Fcircle><\u002Fsc-for>\n            <\u002Fg>\n          <\u002Fsvg>\n          <div style=\"font-size:13px;font-weight:600;color:#1F2933;margin-top:8px;line-height:1.35;\">{{ ex.name }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"font-size:20px;font-weight:700;letter-spacing:-0.01em;margin:36px 0 16px;\">Core / Hip<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;\">\n      <sc-for list=\"{{ core }}\" as=\"ex\" hint-placeholder-count=\"8\">\n        <div style=\"background:#fff;border:1px solid #E3E8DF;border-radius:14px;padding:14px;\">\n          <svg viewBox=\"0 0 300 200\" style=\"width:100%;height:auto;display:block;\" fill=\"none\">\n            <sc-for list=\"{{ ex.a.ellipses }}\" as=\"e\" hint-placeholder-count=\"1\"><ellipse cx=\"{{ e.cx }}\" cy=\"{{ e.cy }}\" rx=\"{{ e.rx }}\" ry=\"{{ e.ry }}\" fill=\"{{ e.fill }}\" stroke=\"{{ e.stroke }}\" stroke-width=\"{{ e.sw }}\"><\u002Fellipse><\u002Fsc-for>\n            <sc-for list=\"{{ ex.a.backCircles }}\" as=\"c\" hint-placeholder-count=\"1\"><circle cx=\"{{ c.cx }}\" cy=\"{{ c.cy }}\" r=\"{{ c.r }}\" fill=\"{{ c.fill }}\" stroke=\"{{ c.stroke }}\" stroke-width=\"{{ c.sw }}\"><\u002Fcircle><\u002Fsc-for>\n            <sc-for list=\"{{ ex.a.segs }}\" as=\"s\" hint-placeholder-count=\"7\"><line x1=\"{{ s.x1 }}\" y1=\"{{ s.y1 }}\" x2=\"{{ s.x2 }}\" y2=\"{{ s.y2 }}\" stroke=\"{{ s.color }}\" stroke-width=\"{{ s.w }}\" stroke-linecap=\"round\"><\u002Fline><\u002Fsc-for>\n            <sc-for list=\"{{ ex.a.rects }}\" as=\"r\" hint-placeholder-count=\"2\"><rect x=\"{{ r.x }}\" y=\"{{ r.y }}\" width=\"{{ r.w }}\" height=\"{{ r.h }}\" rx=\"{{ r.rx }}\" fill=\"{{ r.fill }}\"><\u002Frect><\u002Fsc-for>\n            <sc-for list=\"{{ ex.a.circles }}\" as=\"c\" hint-placeholder-count=\"1\"><circle cx=\"{{ c.cx }}\" cy=\"{{ c.cy }}\" r=\"{{ c.r }}\" fill=\"{{ c.fill }}\" stroke=\"{{ c.stroke }}\" stroke-width=\"{{ c.sw }}\"><\u002Fcircle><\u002Fsc-for>\n            <path d=\"M138 100 h16 M150 94 l6 6 l-6 6\" stroke=\"#D98F45\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpath>\n            <g transform=\"translate(158,0)\">\n              <sc-for list=\"{{ ex.b.ellipses }}\" as=\"e\" hint-placeholder-count=\"1\"><ellipse cx=\"{{ e.cx }}\" cy=\"{{ e.cy }}\" rx=\"{{ e.rx }}\" ry=\"{{ e.ry }}\" fill=\"{{ e.fill }}\" stroke=\"{{ e.stroke }}\" stroke-width=\"{{ e.sw }}\"><\u002Fellipse><\u002Fsc-for>\n              <sc-for list=\"{{ ex.b.backCircles }}\" as=\"c\" hint-placeholder-count=\"1\"><circle cx=\"{{ c.cx }}\" cy=\"{{ c.cy }}\" r=\"{{ c.r }}\" fill=\"{{ c.fill }}\" stroke=\"{{ c.stroke }}\" stroke-width=\"{{ c.sw }}\"><\u002Fcircle><\u002Fsc-for>\n              <sc-for list=\"{{ ex.b.segs }}\" as=\"s\" hint-placeholder-count=\"7\"><line x1=\"{{ s.x1 }}\" y1=\"{{ s.y1 }}\" x2=\"{{ s.x2 }}\" y2=\"{{ s.y2 }}\" stroke=\"{{ s.color }}\" stroke-width=\"{{ s.w }}\" stroke-linecap=\"round\"><\u002Fline><\u002Fsc-for>\n              <sc-for list=\"{{ ex.b.rects }}\" as=\"r\" hint-placeholder-count=\"2\"><rect x=\"{{ r.x }}\" y=\"{{ r.y }}\" width=\"{{ r.w }}\" height=\"{{ r.h }}\" rx=\"{{ r.rx }}\" fill=\"{{ r.fill }}\"><\u002Frect><\u002Fsc-for>\n              <sc-for list=\"{{ ex.b.circles }}\" as=\"c\" hint-placeholder-count=\"1\"><circle cx=\"{{ c.cx }}\" cy=\"{{ c.cy }}\" r=\"{{ c.r }}\" fill=\"{{ c.fill }}\" stroke=\"{{ c.stroke }}\" stroke-width=\"{{ c.sw }}\"><\u002Fcircle><\u002Fsc-for>\n            <\u002Fg>\n          <\u002Fsvg>\n          <div style=\"font-size:13px;font-weight:600;color:#1F2933;margin-top:8px;line-height:1.35;\">{{ ex.name }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  buildPose(pose, noFeet){\n    const j=pose.j, props=pose.props||[];\n    const BODY='#2F6B5A', LIGHT='#9BC1B5', DARK='#2B3138', BALL='#F1DAC4', ACC='#D98F45', CABLE='#A2ABB2';\n    const segs=[], rects=[], circles=[], ellipses=[], backCircles=[];\n    const rp=(p)=> typeof p==='string'? j[p] : p;\n    const seg=(a,b,w,color)=>{ if(j[a]&&j[b]) segs.push({x1:j[a][0],y1:j[a][1],x2:j[b][0],y2:j[b][1],w,color}); };\n    // shadow\n    const sh = pose.shadow || [ (j.ankle?(j.ankle[0]+(j.toe?j.toe[0]:j.ankle[0]))/2:64), 188, 28, 5 ];\n    ellipses.push({cx:sh[0],cy:sh[1],rx:sh[2],ry:sh[3],fill:'rgba(0,0,0,0.06)',stroke:'none',sw:0});\n    // back-layer props (e.g. exercise ball behind torso)\n    props.filter(p=>p.layer==='back').forEach(p=>{\n      const pt=rp(p.at);\n      if(p.t==='ball') backCircles.push({cx:pt[0],cy:pt[1],r:p.r,fill:BALL,stroke:ACC,sw:3});\n    });\n    // back limbs (lighter, behind)\n    if(j.knee2){ if(j.toe2 && !noFeet) seg('ankle2','toe2',11,LIGHT); seg('ankle2','knee2',12,LIGHT); seg('knee2','hip',15,LIGHT); }\n    if(j.elbow2){ seg('shoulder','elbow2',12,LIGHT); seg('elbow2','wrist2',12,LIGHT); }\n    // near body\n    if(j.toe && !noFeet) seg('ankle','toe',11,BODY);\n    seg('ankle','knee',13,BODY);\n    seg('knee','hip',16,BODY);\n    seg('hip','shoulder',22,BODY);\n    seg('shoulder','elbow',12,BODY);\n    seg('elbow','wrist',12,BODY);\n    seg('shoulder','head',11,BODY);\n    circles.push({cx:j.head[0],cy:j.head[1],r:13,fill:BODY,stroke:'none',sw:0});\n    // front props\n    const addDb=(pt)=>{ segs.push({x1:pt[0]-13,y1:pt[1],x2:pt[0]+13,y2:pt[1],w:5,color:DARK}); rects.push({x:pt[0]-17,y:pt[1]-10,w:7,h:20,rx:2.5,fill:DARK}); rects.push({x:pt[0]+10,y:pt[1]-10,w:7,h:20,rx:2.5,fill:DARK}); };\n    props.forEach(p=>{\n      const pt=rp(p.at);\n      if(p.t==='db') addDb(pt);\n      else if(p.t==='db2'){ addDb(rp(p.at)); }\n      else if(p.t==='ball' && p.layer!=='back') circles.push({cx:pt[0],cy:pt[1],r:p.r,fill:BALL,stroke:ACC,sw:3});\n      else if(p.t==='cable'){ const to=rp(p.to); segs.push({x1:p.from[0],y1:p.from[1],x2:to[0],y2:to[1],w:2,color:CABLE}); rects.push({x:to[0]-5,y:to[1]-4,w:10,h:8,rx:2,fill:DARK}); }\n      else if(p.t==='band') ellipses.push({cx:p.at[0],cy:p.at[1],rx:p.rx,ry:p.ry||5,fill:'none',stroke:AC
